name: Appium Mobile Automation Tests

on:
  push:
    branches: [ "main", "havva/qa" ]
  pull_request:
    branches: [ "main" ]

jobs:
  android-tests:
    runs-on: ubuntu-latest # Emülatörün hızlı çalışması için linux sunucusu seçiyoruz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Node.js & Appium
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Appium Server & Drivers
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Appium Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          script: mvn test